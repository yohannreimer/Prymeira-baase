name: Publish Baase Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: ghcr.io/yohannreimer/prymeira-baase-api
            dockerfile: apps/api/Dockerfile
            sourcemaps: "false"
          - name: web
            image: ghcr.io/yohannreimer/prymeira-baase-web
            dockerfile: apps/web/Dockerfile
            sourcemaps: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          build-args: |
            VITE_BAASE_RELEASE=${{ github.sha }}
            GLITCHTIP_SOURCEMAPS_UPLOAD=${{ matrix.sourcemaps }}
          secrets: |
            glitchtip_auth_token=${{ secrets.GLITCHTIP_AUTH_TOKEN }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
