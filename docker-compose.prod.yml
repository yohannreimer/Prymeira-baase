version: "3.7"

services:
  prymeira_baase_postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: baase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${BAASE_POSTGRES_PASSWORD}
    networks:
      prymeira_baase_internal:
        aliases:
          - postgres
    volumes:
      - prymeira_baase_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d baase"]
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.hostname == manager01
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
      restart_policy:
        condition: on-failure

  prymeira_baase_api:
    image: ghcr.io/yohannreimer/prymeira-baase-api:${BAASE_IMAGE_TAG:-latest}
    networks:
      prymeira_baase_internal:
        aliases:
          - prymeira_baase_api
          - baase_api
    environment:
      DATABASE_URL: postgresql://postgres:${BAASE_POSTGRES_PASSWORD}@postgres:5432/baase
      BAASE_RUNTIME_MODE: production
      BAASE_AUTH_MODE: account
      BAASE_OPERATIONAL_STORE: ${BAASE_OPERATIONAL_STORE:-jsonb}
      BAASE_SEED_DEMO_DATA: "false"
      BAASE_STUDIO_ENABLED: "true"
      BAASE_STUDIO_VECTOR_ENABLED: "true"
      BAASE_STUDIO_AI_MODEL: ${BAASE_STUDIO_AI_MODEL:-gpt-5.6-terra}
      BAASE_STUDIO_EMBEDDING_MODEL: ${BAASE_STUDIO_EMBEDDING_MODEL:-text-embedding-3-small}
      PRYMEIRA_ACCOUNT_API_URL: https://hub.prymeiradigital.com.br/api
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: prymeira-baase
      S3_ACCESS_KEY: ${BAASE_MINIO_ACCESS_KEY}
      S3_SECRET_KEY: ${BAASE_MINIO_SECRET_KEY}
      S3_FORCE_PATH_STYLE: "true"
      S3_MULTIPART_CLEANUP_MODE: minio-native
      PORT: 3090
      HOST: 0.0.0.0
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3090/readiness').then(async r=>{const body=await r.json().catch(()=>null);process.exit(r.ok&&body?.ok===true&&body?.studio?.enabled===true&&body?.studio?.vector_configured===true?0:1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 8s
      retries: 12
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.hostname == manager01
      resources:
        limits:
          cpus: "0.50"
          memory: 768M
      restart_policy:
        condition: on-failure

  prymeira_baase_minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${BAASE_MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${BAASE_MINIO_SECRET_KEY}
      MINIO_API_STALE_UPLOADS_EXPIRY: 24h
      MINIO_API_STALE_UPLOADS_CLEANUP_INTERVAL: 1h
    networks:
      prymeira_baase_internal:
        aliases:
          - prymeira_baase_minio
          - minio
    volumes:
      - prymeira_baase_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.hostname == manager01
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
      restart_policy:
        condition: on-failure

  prymeira_baase_minio_bootstrap:
    image: ghcr.io/yohannreimer/prymeira-baase-api:${BAASE_IMAGE_TAG:-latest}
    command: ["pnpm", "--filter", "@prymeira/baase-api", "storage:bootstrap"]
    networks:
      - prymeira_baase_internal
    environment:
      BAASE_RUNTIME_MODE: production
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: prymeira-baase
      S3_ACCESS_KEY: ${BAASE_MINIO_ACCESS_KEY}
      S3_SECRET_KEY: ${BAASE_MINIO_SECRET_KEY}
      S3_FORCE_PATH_STYLE: "true"
      S3_MULTIPART_CLEANUP_MODE: minio-native
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.hostname == manager01
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure

  prymeira_baase_web:
    image: ghcr.io/yohannreimer/prymeira-baase-web:${BAASE_IMAGE_TAG:-latest}
    networks:
      - network_swarm_public
      - prymeira_baase_internal
    environment:
      BAASE_API_UPSTREAM: http://prymeira_baase_api:3090
      VITE_BAASE_AUTH_MODE: account
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
      VITE_PRYMEIRA_ACCOUNT_API_URL: https://hub.prymeiradigital.com.br/api
      VITE_PRYMEIRA_HUB_URL: https://hub.prymeiradigital.com.br
      VITE_PRYMEIRA_PRODUCT_KEY: base
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.hostname == manager01
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_swarm_public
        - traefik.http.services.prymeira-baase.loadbalancer.server.port=80

        - traefik.http.routers.prymeira-baase.rule=Host(`baase.prymeiradigital.com.br`)
        - traefik.http.routers.prymeira-baase.entrypoints=websecure
        - traefik.http.routers.prymeira-baase.tls=true
        - traefik.http.routers.prymeira-baase.tls.certresolver=letsencryptresolver
        - traefik.http.routers.prymeira-baase.service=prymeira-baase

volumes:
  prymeira_baase_postgres_data:
    external: true
    name: prymeira_baase_postgres_data
  prymeira_baase_minio_data:
    external: true
    name: prymeira_baase_minio_data

networks:
  network_swarm_public:
    external: true
  prymeira_baase_internal:
    driver: overlay
