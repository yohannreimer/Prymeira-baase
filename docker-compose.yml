services:
  postgres:
    image: postgres:16-alpine
    container_name: prymeira-baase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: baase
      POSTGRES_USER: baase
      POSTGRES_PASSWORD: baase
    ports:
      - "5433:5432"
    volumes:
      - baase_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baase -d baase"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  baase_postgres_data:
